<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library — All Themes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh;
  background: #111;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  gap: 40px;
  padding: 48px 32px 64px;
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased;
  flex-wrap: wrap;
}

.phone-wrap { display: flex; flex-direction: column; align-items: center; }
.phone {
  width: 360px; height: 820px;
  border-radius: 44px;
  overflow: hidden;
  display: flex; flex-direction: column;
  position: relative; flex-shrink: 0;
}
.theme-label {
  margin-top: 18px;
  font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: 0.22em;
  text-transform: uppercase; color: #3a3a3a;
  text-align: center;
}

/* ══ TOKENS ══ */
.nothing {
  --bg: #000; --surface: #111; --surface2: #1a1a1a; --surface3: #222;
  --border: #242424; --border2: #2e2e2e;
  --muted: #444; --muted2: #666;
  --fg: #f0f0f0; --fg-dim: rgba(240,240,240,.5);
  --accent: #ff3b3b; --accent-dim: rgba(255,59,59,.12);
  --tab-ind: #ff3b3b; --tab-active: #f0f0f0;
  --art-bg1: #1a1a1a; --art-bg2: #222; --art-stroke: #333;
  --art-mark: rgba(255,59,59,.35);
  --hover: rgba(255,255,255,.03);
  --section-col: #2a2a2a;
  background: var(--bg);
  box-shadow: 0 0 0 1px #1c1c1c, 0 48px 100px rgba(0,0,0,.95), 0 0 80px rgba(255,59,59,.04);
}
.obsidian {
  --bg: #0a0a0a; --surface: #111; --surface2: #191919; --surface3: #202020;
  --border: #1e1e1e; --border2: #282828;
  --muted: #3e3e3e; --muted2: #5e5e5e;
  --fg: #e8e8e8; --fg-dim: rgba(232,232,232,.45);
  --accent: #e8e8e8; --accent-dim: rgba(232,232,232,.06);
  --tab-ind: #e8e8e8; --tab-active: #e8e8e8;
  --art-bg1: #161616; --art-bg2: #1e1e1e; --art-stroke: #2a2a2a;
  --art-mark: rgba(232,232,232,.2);
  --hover: rgba(255,255,255,.025);
  --section-col: #252525;
  background: var(--bg);
  box-shadow: 0 0 0 1px #1a1a1a, 0 48px 100px rgba(0,0,0,.95);
}
.chalk {
  --bg: #f2f0eb; --surface: #eae7e0; --surface2: #e0ddd6; --surface3: #d6d2ca;
  --border: #ccc8bf; --border2: #b8b3a8;
  --muted: #a09a92; --muted2: #7a756e;
  --fg: #1a1814; --fg-dim: rgba(26,24,20,.4);
  --accent: #1a1814; --accent-dim: rgba(26,24,20,.06);
  --tab-ind: #1a1814; --tab-active: #1a1814;
  --art-bg1: #dedad2; --art-bg2: #d4d0c8; --art-stroke: #c4c0b8;
  --art-mark: rgba(26,24,20,.18);
  --hover: rgba(26,24,20,.04);
  --section-col: #ccc8bf;
  background: var(--bg);
  box-shadow: 0 0 0 1px var(--border), 0 48px 100px rgba(26,24,20,.22), inset 0 0 0 1px rgba(255,255,255,.55);
}

/* ══ STATUS ══ */
.status {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 26px 0; height: 46px; flex-shrink: 0; color: var(--fg);
}
.status-time { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: .04em; }
.status-icons { display: flex; gap: 5px; align-items: center; }

/* ══ HEADER ══ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px 0; flex-shrink: 0;
}
.header-title {
  font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700;
  letter-spacing: .04em; color: var(--fg); line-height: 1;
}
.header-actions { display: flex; align-items: center; gap: 4px; }
.icon-btn {
  background: none; border: none; cursor: pointer; color: var(--muted2);
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 3px; transition: color .15s;
}
.icon-btn:hover { color: var(--fg); }
.scan-btn {
  font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  background: none; border: 1px solid var(--border2); color: var(--muted2);
  padding: 5px 12px; border-radius: 3px; cursor: pointer;
  transition: color .15s, border-color .15s;
}
.scan-btn:hover { color: var(--fg); border-color: var(--fg-dim); }

/* ══ SEARCH ══ */
.search-wrap { padding: 14px 22px 0; flex-shrink: 0; }
.search-box {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 3px; padding: 10px 14px; cursor: text;
}
.search-box svg { color: var(--muted2); flex-shrink: 0; }
.search-box span {
  font-family: 'DM Sans', sans-serif; font-size: 14px;
  color: var(--muted2); pointer-events: none;
}

/* ══ SEG TABS ══ */
.seg-tabs {
  display: flex; padding: 14px 22px 0; gap: 0;
  flex-shrink: 0; border-bottom: 1px solid var(--border); margin-top: 2px;
}
.seg-tab {
  background: none; border: none; cursor: pointer;
  font-family: 'Space Mono', monospace; font-size: 9.5px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted2); padding: 0 0 10px; margin-right: 22px;
  position: relative; transition: color .15s; white-space: nowrap;
}
.seg-tab.active { color: var(--tab-active); }
.seg-tab.active::after {
  content: ''; position: absolute; bottom: -1px; left: 0; right: 0;
  height: 2px; background: var(--tab-ind); border-radius: 2px 2px 0 0;
}

/* ══ CONTENT ══ */
.content { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; padding-bottom: 8px; }
.content::-webkit-scrollbar { display: none; }

/* ══ SECTION LABELS ══ */
.section-label {
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
  letter-spacing: .2em; text-transform: uppercase; color: var(--muted);
  padding: 16px 22px 10px; background: var(--bg);
}
.alpha-head {
  font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
  letter-spacing: .1em; color: var(--section-col);
  padding: 12px 22px 4px; background: var(--bg);
}

/* ══ RECENT STRIP ══ */
.recent-scroll {
  display: flex; gap: 12px; padding: 0 22px 0;
  overflow-x: auto; scrollbar-width: none;
}
.recent-scroll::-webkit-scrollbar { display: none; }
.recent-card { flex-shrink: 0; width: 96px; cursor: pointer; }
.recent-art {
  width: 96px; height: 96px; border-radius: 3px;
  border: 1px solid var(--border2); background: var(--surface2);
  overflow: hidden; display: block;
}
.recent-title {
  margin-top: 6px; font-family: 'DM Sans', sans-serif; font-size: 12px;
  font-weight: 500; color: var(--fg);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
}
.recent-sub {
  font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .06em;
  color: var(--muted2); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; margin-top: 2px;
}

/* ══ SONG ROW ══ */
.song-row {
  display: flex; align-items: center; padding: 8px 22px;
  gap: 12px; cursor: pointer; transition: background .12s; position: relative;
}
.song-row:hover { background: var(--hover); }
.song-row + .song-row::before {
  content: ''; position: absolute; top: 0;
  left: 80px; right: 22px; height: 1px; background: var(--border);
}
.art-cell {
  width: 46px; height: 46px; border-radius: 3px; flex-shrink: 0;
  border: 1px solid var(--border2); background: var(--surface2); overflow: hidden;
}
.song-text { flex: 1; min-width: 0; }
.song-title {
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3;
}
.song-title.playing { color: var(--accent); }
.song-artist {
  font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: .06em;
  color: var(--muted2); white-space: nowrap; overflow: hidden;
  text-overflow: ellipsis; margin-top: 2px;
}
.song-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.song-dur { font-family: 'Space Mono', monospace; font-size: 10px; letter-spacing: .04em; color: var(--muted); }
.eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 14px; width: 14px; }
.eq-bar { width: 3px; border-radius: 1px; background: var(--accent); animation: eq .8s ease-in-out infinite alternate; }
.eq-bar:nth-child(1) { height: 60%; animation-delay: 0s; }
.eq-bar:nth-child(2) { height: 100%; animation-delay: .2s; }
.eq-bar:nth-child(3) { height: 40%; animation-delay: .4s; }
@keyframes eq { from { transform: scaleY(.3); } to { transform: scaleY(1); } }

.divider { height: 1px; background: var(--border); margin: 14px 22px 0; }

/* ══ BOTTOM NAV ══ */
.bottom-nav { display: flex; height: 68px; flex-shrink: 0; border-top: 1px solid var(--border); }
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; background: none; border: none; cursor: pointer; color: var(--muted2);
  padding-bottom: 8px; position: relative; transition: color .14s;
}
.nav-tab.active { color: var(--fg); }
.nav-tab.active::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 2px; border-radius: 0 0 2px 2px; background: var(--tab-ind);
}
.nav-tab span { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: .2em; text-transform: uppercase; }

/* ══ LOAD ANIM ══ */
.header { animation: up .45s .04s both; }
.search-wrap { animation: up .45s .09s both; }
.seg-tabs { animation: up .45s .13s both; }
.content { animation: up .45s .18s both; }
@keyframes up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<script>
/* ══ GENERATIVE ART HELPERS ══
   No external images. Each track/album gets a deterministic
   geometric composition derived from its title string.
   Patterns: diagonal lines, concentric rings, grid, waveform, chevrons.
*/
function hash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return Math.abs(h);
}

function artSVG(seed, size, bgVar, strokeVar, markVar) {
  const h = hash(seed);
  const type = h % 5; // 0=lines 1=rings 2=grid 3=wave 4=chevrons

  // Use CSS vars via currentColor trick — pass explicit hex instead
  // We'll pass colours as args and inline them
  const s = size;
  const cx = s / 2, cy = s / 2;

  let paths = '';

  if (type === 0) {
    // Diagonal hatching
    const gap = 8 + (h % 6) * 2;
    for (let i = -s; i < s * 2; i += gap) {
      paths += `<line x1="${i}" y1="0" x2="${i + s}" y2="${s}" stroke="STROKE" stroke-width="1" opacity="0.7"/>`;
    }
    // Single bold diagonal
    const off = (h % (s / 2));
    paths += `<line x1="${off}" y1="0" x2="${off + s}" y2="${s}" stroke="MARK" stroke-width="2.5" opacity="0.9"/>`;
  } else if (type === 1) {
    // Concentric rings
    const count = 3 + (h % 4);
    const step = (s * 0.42) / count;
    for (let i = 1; i <= count; i++) {
      const r = step * i;
      const op = 0.3 + (i / count) * 0.5;
      paths += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="STROKE" stroke-width="${1 + (i === count ? 1 : 0)}" opacity="${op}"/>`;
    }
    // Centre dot
    paths += `<circle cx="${cx}" cy="${cy}" r="3" fill="MARK" opacity="0.8"/>`;
  } else if (type === 2) {
    // Dot grid
    const cols = 5 + (h % 3);
    const gapX = s / (cols + 1);
    const rows = Math.round(s / gapX);
    for (let r = 1; r <= rows; r++) {
      for (let c = 1; c <= cols; c++) {
        const rr = hash(seed + r * 31 + c * 17) % 3;
        const op = rr === 0 ? 0.6 : rr === 1 ? 0.25 : 0.1;
        paths += `<circle cx="${gapX * c}" cy="${gapX * r}" r="1.5" fill="STROKE" opacity="${op}"/>`;
      }
    }
    // Accent dot
    const ac = 1 + (h % cols), ar = 1 + ((h >> 4) % rows);
    paths += `<circle cx="${gapX * ac}" cy="${gapX * ar}" r="3.5" fill="MARK" opacity="0.85"/>`;
  } else if (type === 3) {
    // Waveform bars
    const bars = 16 + (h % 8);
    const bw = (s - 12) / bars;
    for (let i = 0; i < bars; i++) {
      const bh = 6 + (hash(seed + i * 7) % (s * 0.55));
      const x = 6 + i * bw + bw * 0.1;
      const y = cy - bh / 2;
      const op = 0.25 + (i % 3 === 0 ? 0.55 : 0.15);
      paths += `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${(bw * 0.7).toFixed(1)}" height="${bh.toFixed(1)}" rx="1" fill="STROKE" opacity="${op}"/>`;
    }
    // Highlighted bar
    const hi = h % bars;
    const hh = 6 + (hash(seed + hi * 7) % (s * 0.55));
    const hx = 6 + hi * bw + bw * 0.1;
    paths += `<rect x="${hx.toFixed(1)}" y="${(cy - hh / 2).toFixed(1)}" width="${(bw * 0.7).toFixed(1)}" height="${hh.toFixed(1)}" rx="1" fill="MARK" opacity="0.9"/>`;
  } else {
    // Chevrons
    const count = 3 + (h % 4);
    const step = s / (count + 1);
    for (let i = 1; i <= count; i++) {
      const y = step * i;
      const hw = s * 0.35;
      const ht = s * 0.09;
      const op = 0.15 + (i / count) * 0.55;
      paths += `<polyline points="${cx - hw},${y + ht} ${cx},${y - ht} ${cx + hw},${y + ht}" fill="none" stroke="STROKE" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="${op}"/>`;
    }
    // Bold chevron
    const by = step * (1 + (h % count));
    const hw = s * 0.35, ht = s * 0.09;
    paths += `<polyline points="${cx - hw},${by + ht} ${cx},${by - ht} ${cx + hw},${by + ht}" fill="none" stroke="MARK" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`;
  }

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">`
    + `<rect width="${s}" height="${s}" fill="BG2"/>`
    + paths
      .replace(/STROKE/g, strokeVar)
      .replace(/MARK/g, markVar)
      .replace(/BG2/g, bgVar)
    + `</svg>`;
}

// Encode SVG to data URI
function svgDataUri(svgStr) {
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);
}

// Theme-aware colour sets
const themeArt = {
  nothing:  { bg: '#191919', stroke: '#333', mark: 'rgba(255,59,59,0.7)'  },
  obsidian: { bg: '#181818', stroke: '#2e2e2e', mark: 'rgba(232,232,232,0.5)' },
  chalk:    { bg: '#dedad2', stroke: '#c0bbb3', mark: 'rgba(26,24,20,0.4)' },
};

function makeArt(seed, size, theme) {
  const t = themeArt[theme];
  return svgDataUri(artSVG(seed, size, t.bg, t.stroke, t.mark));
}

/* ══ DATA ══ */
const songs = [
  { title: 'Tose Naina',   artist: 'Arijit Singh',          label: 'T-Series',           dur: '4:23', playing: true,  alpha: '#' },
  { title: 'Bulleya',      artist: 'Papon',                  label: 'YRF',                dur: '4:33', playing: false, alpha: 'B' },
  { title: 'AIZO',         artist: 'King Gnu',               label: 'King Gnu Official',  dur: '3:57', playing: false, alpha: 'K' },
  { title: 'RISE',         artist: 'The Glitch Mob',         label: 'League of Legends',  dur: '3:30', playing: false, alpha: 'R' },
  { title: 'Titli',        artist: 'Shreya Ghoshal',         label: 'T-Series',           dur: '5:47', playing: false, alpha: 'T' },
];

const themes = [
  { cls: 'nothing',  label: 'Nothing — Red Accent' },
  { cls: 'obsidian', label: 'Obsidian — Dark Mono'  },
  { cls: 'chalk',    label: 'Chalk — Light Mono'    },
];

function statusIcons() {
  return `
    <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
      <rect x="0" y="6" width="3" height="5" rx=".5"/>
      <rect x="4" y="4" width="3" height="7" rx=".5"/>
      <rect x="8" y="2" width="3" height="9" rx=".5"/>
      <rect x="12" y="0" width="3" height="11" rx=".5" opacity=".25"/>
    </svg>
    <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
      <path d="M7.5 8.5a1.3 1.3 0 110 2.6 1.3 1.3 0 010-2.6zm0-3.2c1.6 0 3 .7 4 1.8L10.2 8.4A3.6 3.6 0 007.5 7.3c-1 0-2 .4-2.7 1.1L3.5 7.1a5.4 5.4 0 014-1.8zm0-3.1c2.5 0 4.7 1 6.3 2.7l-1.3 1.3A6.2 6.2 0 007.5 4 6.2 6.2 0 002 6.2L.7 4.9A8.5 8.5 0 017.5 2.2z"/>
    </svg>
    <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
      <rect x=".5" y=".5" width="20" height="10" rx="2.5" stroke="currentColor" stroke-opacity=".4"/>
      <rect x="2" y="2" width="15" height="7" rx="1.5" fill="currentColor"/>
      <path d="M22 3.5v4a1.8 1.8 0 000-4z" fill="currentColor" opacity=".35"/>
    </svg>`;
}

function renderPhone(theme) {
  const tid = theme.cls;

  // Grouped songs
  const grouped = {};
  songs.forEach(s => { if (!grouped[s.alpha]) grouped[s.alpha] = []; grouped[s.alpha].push(s); });

  // Recent cards (first 3)
  const recentCards = songs.slice(0, 3).map(s => `
    <div class="recent-card">
      <div class="recent-art">
        <img src="${makeArt(s.title, 96, tid)}" width="96" height="96" style="display:block;">
      </div>
      <div class="recent-title">${s.title}</div>
      <div class="recent-sub">${s.artist}</div>
    </div>
  `).join('');

  // Song rows grouped by alpha
  const rows = Object.entries(grouped).map(([alpha, group]) => {
    const rowHtml = group.map(s => `
      <div class="song-row">
        <div class="art-cell">
          <img src="${makeArt(s.title, 46, tid)}" width="46" height="46" style="display:block;">
        </div>
        <div class="song-text">
          <div class="song-title ${s.playing ? 'playing' : ''}">${s.title}</div>
          <div class="song-artist">${s.artist}</div>
        </div>
        <div class="song-right">
          ${s.playing ? `<div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>` : ''}
          <span class="song-dur">${s.dur}</span>
        </div>
      </div>
    `).join('');
    return `<div class="alpha-head">${alpha}</div>${rowHtml}`;
  }).join('');

  const navTabs = [
    { l: 'Library', active: true,  icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>` },
    { l: 'Player',  active: false, icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>` },
    { l: 'Queue',   active: false, icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>` },
  ].map(t => `
    <button class="nav-tab ${t.active ? 'active' : ''}">
      ${t.icon}<span>${t.l}</span>
    </button>`).join('');

  return `
  <div class="phone-wrap">
    <div class="phone ${tid}">
      <div class="status">
        <span class="status-time">9:41</span>
        <div class="status-icons">${statusIcons()}</div>
      </div>
      <div class="header">
        <span class="header-title">LIBRARY</span>
        <div class="header-actions">
          <button class="icon-btn" title="Sort">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <line x1="4" y1="6" x2="11" y2="6"/><line x1="4" y1="12" x2="13" y2="12"/>
              <line x1="4" y1="18" x2="20" y2="18"/>

            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">

          <button class="scan-btn">Scan</button>

      </div>
      <div class="search-wrap">
        <div class="search-box">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>

      </div>
      <div class="seg-tabs">
        <button class="seg-tab active">Songs</button>
        <button class="seg-tab">Albums</button>
        <button class="seg-tab">Artists</button>
        <button class="seg-tab">Playlists</button>
      </div>
      <div class="content">
        <div class="section-label">Recent</div>
        <div class="recent-scroll">${recentCards}</div>
        <div class="divider"></div>
        ${rows}
      </div>
      <div class="bottom-nav">${navTabs}</div>
    </div>
    <p class="theme-label">${theme.label}</p>
  </div>`;
}

document.body.innerHTML = themes.map(renderPhone).join('');

// Seg tab interaction
document.querySelectorAll('.seg-tabs').forEach(tabs => {
  tabs.querySelectorAll('.seg-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.querySelectorAll('.seg-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });
});
</script>
