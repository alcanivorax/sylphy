<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Queue — All Themes</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                min-height: 100vh;
                background: #111111;
                display: flex;
                align-items: flex-start;
                justify-content: center;
                gap: 40px;
                padding: 48px 32px 64px;
                font-family: "DM Sans", sans-serif;
                -webkit-font-smoothing: antialiased;
                flex-wrap: wrap;
            }

            /* ─── PHONE SHELL ─── */
            .phone-wrap {
                display: flex;
                flex-direction: column;
                align-items: center;
            }
            .phone {
                width: 360px;
                height: 820px;
                border-radius: 44px;
                overflow: hidden;
                display: flex;
                flex-direction: column;
                position: relative;
                flex-shrink: 0;
            }
            .theme-label {
                margin-top: 18px;
                font-family: "Space Mono", monospace;
                font-size: 9px;
                letter-spacing: 0.22em;
                text-transform: uppercase;
                color: #3a3a3a;
                text-align: center;
            }

            /* ═══════════════════════════════════════
   THEME TOKENS
═══════════════════════════════════════ */
            .nothing {
                --bg: #000000;
                --surface: #0e0e0e;
                --surface2: #161616;
                --surface3: #1e1e1e;
                --border: #222222;
                --border2: #2c2c2c;
                --muted: #444444;
                --muted2: #666666;
                --fg: #f0f0f0;
                --fg-dim: rgba(240, 240, 240, 0.45);
                --accent: #ff3b3b;
                --accent-dim: rgba(255, 59, 59, 0.12);
                --accent-glow: rgba(255, 59, 59, 0.06);
                --tab-indicator: #ff3b3b;
                --playing-bg: rgba(255, 59, 59, 0.07);
                --playing-border: rgba(255, 59, 59, 0.22);
                --playing-title: #ff3b3b;
                --drag-handle: #333333;
                --remove-color: #444444;
                --remove-hover: #ff3b3b;
                --progress-fill: #ff3b3b;
                --badge-border: #ff3b3b;
                --badge-color: #ff3b3b;
                background: var(--bg);
                box-shadow:
                    0 0 0 1px #1c1c1c,
                    0 48px 100px rgba(0, 0, 0, 0.95),
                    0 0 80px rgba(255, 59, 59, 0.04);
            }
            .obsidian {
                --bg: #0a0a0a;
                --surface: #111111;
                --surface2: #181818;
                --surface3: #202020;
                --border: #1e1e1e;
                --border2: #272727;
                --muted: #3a3a3a;
                --muted2: #5a5a5a;
                --fg: #e8e8e8;
                --fg-dim: rgba(232, 232, 232, 0.4);
                --accent: #e8e8e8;
                --accent-dim: rgba(232, 232, 232, 0.06);
                --accent-glow: rgba(232, 232, 232, 0.03);
                --tab-indicator: #e8e8e8;
                --playing-bg: rgba(232, 232, 232, 0.05);
                --playing-border: rgba(232, 232, 232, 0.14);
                --playing-title: #e8e8e8;
                --drag-handle: #2e2e2e;
                --remove-color: #3a3a3a;
                --remove-hover: #888888;
                --progress-fill: #e8e8e8;
                --badge-border: #e8e8e8;
                --badge-color: #e8e8e8;
                background: var(--bg);
                box-shadow:
                    0 0 0 1px #1a1a1a,
                    0 48px 100px rgba(0, 0, 0, 0.95);
            }
            .chalk {
                --bg: #f2f0eb;
                --surface: #eae7e0;
                --surface2: #e0ddd6;
                --surface3: #d6d2ca;
                --border: #ccc8bf;
                --border2: #b8b3a8;
                --muted: #a09a92;
                --muted2: #7a756e;
                --fg: #1a1814;
                --fg-dim: rgba(26, 24, 20, 0.4);
                --accent: #1a1814;
                --accent-dim: rgba(26, 24, 20, 0.06);
                --accent-glow: rgba(26, 24, 20, 0.03);
                --tab-indicator: #1a1814;
                --playing-bg: rgba(26, 24, 20, 0.05);
                --playing-border: rgba(26, 24, 20, 0.18);
                --playing-title: #1a1814;
                --drag-handle: #c0bbb3;
                --remove-color: #b0aba3;
                --remove-hover: #555050;
                --progress-fill: #1a1814;
                --badge-border: #1a1814;
                --badge-color: #1a1814;
                background: var(--bg);
                box-shadow:
                    0 0 0 1px var(--border),
                    0 48px 100px rgba(26, 24, 20, 0.22),
                    inset 0 0 0 1px rgba(255, 255, 255, 0.55);
            }

            /* ═══════════════════════════════════════
   STATUS BAR
═══════════════════════════════════════ */
            .status {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 14px 26px 0;
                height: 46px;
                flex-shrink: 0;
                color: var(--fg);
            }
            .status-time {
                font-family: "Space Mono", monospace;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.04em;
            }
            .status-icons {
                display: flex;
                gap: 5px;
                align-items: center;
            }

            /* ═══════════════════════════════════════
   HEADER
═══════════════════════════════════════ */
            .header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 14px 22px 0;
                flex-shrink: 0;
            }
            .header-left {
                display: flex;
                flex-direction: column;
                gap: 2px;
            }
            .header-title {
                font-family: "Space Mono", monospace;
                font-size: 22px;
                font-weight: 700;
                letter-spacing: 0.04em;
                color: var(--fg);
                line-height: 1;
            }
            .header-meta {
                font-family: "Space Mono", monospace;
                font-size: 9px;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--muted2);
                margin-top: 4px;
            }
            .header-actions {
                display: flex;
                gap: 4px;
                align-items: center;
            }
            .icon-btn {
                background: none;
                border: none;
                cursor: pointer;
                color: var(--muted2);
                width: 36px;
                height: 36px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 3px;
                transition: color 0.14s;
            }
            .icon-btn:hover {
                color: var(--fg);
            }
            .icon-btn.accent {
                color: var(--accent);
            }

            /* ═══════════════════════════════════════
   NOW PLAYING CARD
═══════════════════════════════════════ */
            .np-card {
                margin: 16px 22px 0;
                border: 1px solid var(--playing-border);
                border-radius: 3px;
                background: var(--playing-bg);
                padding: 12px;
                display: flex;
                align-items: center;
                gap: 12px;
                flex-shrink: 0;
                position: relative;
                overflow: hidden;
            }
            /* Subtle left accent bar */
            .np-card::before {
                content: "";
                position: absolute;
                left: 0;
                top: 0;
                bottom: 0;
                width: 2px;
                background: var(--accent);
                border-radius: 3px 0 0 3px;
            }
            .np-art-wrap {
                position: relative;
                flex-shrink: 0;
            }
            .np-art {
                width: 52px;
                height: 52px;
                border-radius: 3px;
                object-fit: cover;
                display: block;
                border: 1px solid var(--border2);
                background: var(--surface2);
            }
            /* Small eq overlay on art */
            .np-eq {
                position: absolute;
                bottom: 4px;
                left: 4px;
                display: flex;
                align-items: flex-end;
                gap: 2px;
                background: rgba(0, 0, 0, 0.55);
                padding: 3px 4px 2px;
                border-radius: 2px;
            }
            .chalk .np-eq {
                background: rgba(242, 240, 235, 0.7);
            }
            .np-eq-bar {
                width: 3px;
                border-radius: 1px;
                background: var(--accent);
                animation: eqpulse 0.7s ease-in-out infinite alternate;
            }
            .np-eq-bar:nth-child(1) {
                height: 8px;
                animation-delay: 0s;
            }
            .np-eq-bar:nth-child(2) {
                height: 12px;
                animation-delay: 0.18s;
            }
            .np-eq-bar:nth-child(3) {
                height: 6px;
                animation-delay: 0.36s;
            }
            @keyframes eqpulse {
                from {
                    transform: scaleY(0.25);
                }
                to {
                    transform: scaleY(1);
                }
            }

            .np-info {
                flex: 1;
                min-width: 0;
            }
            .np-label {
                font-family: "Space Mono", monospace;
                font-size: 8px;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                color: var(--accent);
                margin-bottom: 4px;
            }
            .np-title {
                font-family: "DM Sans", sans-serif;
                font-size: 15px;
                font-weight: 500;
                color: var(--fg);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                line-height: 1.2;
            }
            .np-artist {
                font-family: "Space Mono", monospace;
                font-size: 9.5px;
                letter-spacing: 0.06em;
                color: var(--muted2);
                margin-top: 2px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            /* Mini scrubber inside card */
            .np-scrubber {
                margin-top: 10px;
            }
            .np-track {
                width: 100%;
                height: 2px;
                background: var(--border2);
                border-radius: 2px;
                position: relative;
            }
            .np-fill {
                height: 100%;
                width: 26%;
                background: var(--progress-fill);
                border-radius: 2px;
            }
            .np-times {
                display: flex;
                justify-content: space-between;
                margin-top: 5px;
            }
            .np-times span {
                font-family: "Space Mono", monospace;
                font-size: 9px;
                color: var(--muted);
                letter-spacing: 0.04em;
            }

            /* ═══════════════════════════════════════
   SECTION DIVIDER
═══════════════════════════════════════ */
            .queue-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 18px 22px 8px;
                flex-shrink: 0;
            }
            .queue-header-label {
                font-family: "Space Mono", monospace;
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--muted);
            }
            .queue-header-right {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .queue-count {
                font-family: "Space Mono", monospace;
                font-size: 9px;
                letter-spacing: 0.1em;
                color: var(--muted);
            }
            .clear-btn {
                font-family: "Space Mono", monospace;
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 0.1em;
                text-transform: uppercase;
                background: none;
                border: none;
                cursor: pointer;
                color: var(--muted2);
                padding: 3px 0;
                transition: color 0.14s;
            }
            .clear-btn:hover {
                color: var(--fg);
            }

            /* ═══════════════════════════════════════
   QUEUE LIST
═══════════════════════════════════════ */
            .queue-list {
                flex: 1;
                overflow-y: auto;
                overflow-x: hidden;
                scrollbar-width: none;
                padding-bottom: 8px;
            }
            .queue-list::-webkit-scrollbar {
                display: none;
            }

            .q-row {
                display: flex;
                align-items: center;
                padding: 8px 22px;
                gap: 10px;
                cursor: pointer;
                transition: background 0.12s;
                position: relative;
                user-select: none;
            }
            .q-row:hover {
                background: var(--accent-dim);
            }
            /* Row border */
            .q-row + .q-row::before {
                content: "";
                position: absolute;
                top: 0;
                left: 68px;
                right: 22px;
                height: 1px;
                background: var(--border);
            }

            /* Drag handle */
            .drag-handle {
                display: flex;
                flex-direction: column;
                gap: 3px;
                flex-shrink: 0;
                cursor: grab;
                padding: 4px 2px;
                opacity: 0;
                transition: opacity 0.15s;
            }
            .q-row:hover .drag-handle {
                opacity: 1;
            }
            .drag-handle span {
                display: block;
                width: 14px;
                height: 1.5px;
                border-radius: 1px;
                background: var(--drag-handle);
            }

            /* Position number */
            .q-pos {
                font-family: "Space Mono", monospace;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.04em;
                color: var(--muted);
                width: 18px;
                text-align: right;
                flex-shrink: 0;
            }

            /* Thumbnail */
            .q-art {
                width: 44px;
                height: 44px;
                border-radius: 3px;
                object-fit: cover;
                flex-shrink: 0;
                border: 1px solid var(--border2);
                background: var(--surface2);
            }

            /* Text */
            .q-text {
                flex: 1;
                min-width: 0;
            }
            .q-title {
                font-family: "DM Sans", sans-serif;
                font-size: 13.5px;
                font-weight: 500;
                color: var(--fg);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                line-height: 1.3;
            }
            .q-artist {
                font-family: "Space Mono", monospace;
                font-size: 9px;
                letter-spacing: 0.06em;
                color: var(--muted2);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
                margin-top: 2px;
            }

            /* Right side */
            .q-right {
                display: flex;
                align-items: center;
                gap: 10px;
                flex-shrink: 0;
            }
            .q-dur {
                font-family: "Space Mono", monospace;
                font-size: 10px;
                color: var(--muted);
                letter-spacing: 0.04em;
            }
            .q-remove {
                background: none;
                border: none;
                cursor: pointer;
                color: var(--remove-color);
                width: 24px;
                height: 24px;
                display: flex;
                align-items: center;
                justify-content: center;
                border-radius: 3px;
                opacity: 0;
                transition:
                    opacity 0.14s,
                    color 0.14s;
                flex-shrink: 0;
            }
            .q-row:hover .q-remove {
                opacity: 1;
            }
            .q-remove:hover {
                color: var(--remove-hover);
            }

            /* ─── EMPTY STATE ─── */
            .empty-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 22px;
                gap: 10px;
                color: var(--muted);
                display: none;
            }
            .empty-state svg {
                opacity: 0.4;
            }
            .empty-state p {
                font-family: "Space Mono", monospace;
                font-size: 10px;
                letter-spacing: 0.14em;
                text-transform: uppercase;
                color: var(--muted);
                text-align: center;
            }

            /* ─── TOTAL DURATION FOOTER ─── */
            .queue-footer {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 10px 22px 0;
                gap: 6px;
                flex-shrink: 0;
                border-top: 1px solid var(--border);
            }
            .queue-footer-text {
                font-family: "Space Mono", monospace;
                font-size: 9px;
                letter-spacing: 0.12em;
                text-transform: uppercase;
                color: var(--muted);
            }
            .queue-footer-dur {
                font-family: "Space Mono", monospace;
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 0.1em;
                color: var(--muted2);
            }

            /* ═══════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════ */
            .bottom-nav {
                display: flex;
                height: 68px;
                flex-shrink: 0;
                border-top: 1px solid var(--border);
            }
            .nav-tab {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 4px;
                background: none;
                border: none;
                cursor: pointer;
                color: var(--muted2);
                padding-bottom: 8px;
                position: relative;
                transition: color 0.14s;
            }
            .nav-tab:hover {
                color: var(--fg-dim);
            }
            .nav-tab.active {
                color: var(--fg);
            }
            .nav-tab.active::before {
                content: "";
                position: absolute;
                top: 0;
                left: 50%;
                transform: translateX(-50%);
                width: 28px;
                height: 2px;
                border-radius: 0 0 2px 2px;
                background: var(--tab-indicator);
            }
            .nav-tab span {
                font-family: "Space Mono", monospace;
                font-size: 8px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
            }

            /* ═══════════════════════════════════════
   LOAD ANIMATION
═══════════════════════════════════════ */
            .header {
                animation: up 0.42s 0.04s both;
            }
            .np-card {
                animation: up 0.42s 0.09s both;
            }
            .queue-header {
                animation: up 0.42s 0.13s both;
            }
            .queue-list {
                animation: up 0.42s 0.17s both;
            }
            @keyframes up {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* ─── Dragging state ─── */
            .q-row.dragging {
                opacity: 0.4;
                background: var(--accent-dim);
            }
            .q-row.drag-over {
                border-top: 2px solid var(--accent) !important;
            }
        </style>
    </head>
    <body>
        <script>
            const queue = [
                {
                    title: "Tose Naina",
                    artist: "Arijit Singh",
                    label: "T-Series",
                    dur: "4:23",
                    img: "https://i.ytimg.com/vi/wMhpMsEQhJU/maxresdefault.jpg",
                },
                {
                    title: "King Gnu — AIZO",
                    artist: "King Gnu",
                    label: "King Gnu Official",
                    dur: "3:57",
                    img: "https://i.ytimg.com/vi/7Mq6N0C7JqA/maxresdefault.jpg",
                },
                {
                    title: "Bulleya",
                    artist: "Papon",
                    label: "YRF",
                    dur: "4:33",
                    img: "https://i.ytimg.com/vi/9aMpRHkZBrc/maxresdefault.jpg",
                },
                {
                    title: "RISE",
                    artist: "The Glitch Mob · Mako",
                    label: "League of Legends",
                    dur: "3:30",
                    img: "https://i.ytimg.com/vi/fB8TyLTD7EE/maxresdefault.jpg",
                },
                {
                    title: "Titli",
                    artist: "Shreya Ghoshal",
                    label: "T-Series",
                    dur: "5:47",
                    img: "https://i.ytimg.com/vi/uiMrJc0PnD4/maxresdefault.jpg",
                },
            ];

            const themes = [
                { cls: "nothing", label: "Nothing — Red Accent" },
                { cls: "obsidian", label: "Obsidian — Dark Mono" },
                { cls: "chalk", label: "Chalk — Light Mono" },
            ];

            function statusIcons() {
                return `
    <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
      <rect x="0" y="6" width="3" height="5" rx="0.5"/>
      <rect x="4" y="4" width="3" height="7" rx="0.5"/>
      <rect x="8" y="2" width="3" height="9" rx="0.5"/>
      <rect x="12" y="0" width="3" height="11" rx="0.5" opacity="0.25"/>
    </svg>
    <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
      <path d="M7.5 8.5a1.3 1.3 0 110 2.6 1.3 1.3 0 010-2.6zm0-3.2c1.6 0 3 .7 4 1.8L10.2 8.4A3.6 3.6 0 007.5 7.3c-1 0-2 .4-2.7 1.1L3.5 7.1a5.4 5.4 0 014-1.8zm0-3.1c2.5 0 4.7 1 6.3 2.7l-1.3 1.3A6.2 6.2 0 007.5 4 6.2 6.2 0 002 6.2L.7 4.9A8.5 8.5 0 017.5 2.2z"/>
    </svg>
    <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
      <rect x="0.5" y="0.5" width="20" height="10" rx="2.5" stroke="currentColor" stroke-opacity="0.4"/>
      <rect x="2" y="2" width="15" height="7" rx="1.5" fill="currentColor"/>
      <path d="M22 3.5v4a1.8 1.8 0 000-4z" fill="currentColor" opacity="0.35"/>
    </svg>`;
            }

            function totalDuration(items) {
                const secs = items.reduce((acc, s) => {
                    const [m, sec] = s.dur.split(":").map(Number);
                    return acc + m * 60 + sec;
                }, 0);
                const h = Math.floor(secs / 3600);
                const m = Math.floor((secs % 3600) / 60);
                const s = secs % 60;
                return h > 0 ? `${h}h ${m}m` : `${m}m ${s}s`;
            }

            function renderRows(items) {
                return items
                    .map(
                        (s, i) => `
    <div class="q-row" draggable="true" data-idx="${i}">
      <div class="drag-handle">
        <span></span><span></span><span></span>
      </div>
      <span class="q-pos">${String(i + 1).padStart(2, "0")}</span>
      <img class="q-art" src="${s.img}" alt="${s.title}"
        onerror="this.style.visibility='hidden'">
      <div class="q-text">
        <div class="q-title">${s.title}</div>
        <div class="q-artist">${s.artist}</div>
      </div>
      <div class="q-right">
        <span class="q-dur">${s.dur}</span>
        <button class="q-remove" title="Remove" data-idx="${i}">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>
  `,
                    )
                    .join("");
            }

            function renderPhone(theme) {
                const np = queue[0];
                const upNext = queue.slice(1);

                return `
  <div class="phone-wrap">
    <div class="phone ${theme.cls}" id="phone-${theme.cls}">

      <div class="status">
        <span class="status-time">9:41</span>
        <div class="status-icons">${statusIcons()}</div>
      </div>

      <div class="header">
        <div class="header-left">
          <span class="header-title">QUEUE</span>
          <span class="header-meta">${queue.length} tracks · ${totalDuration(queue)}</span>
        </div>
        <div class="header-actions">
          <!-- Shuffle -->
          <button class="icon-btn accent" title="Shuffle">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/>
              <line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/>
              <line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
          </button>
          <!-- Add song -->
          <button class="icon-btn" title="Add to queue">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Now Playing Card -->
      <div class="np-card">
        <div class="np-art-wrap">
          <img class="np-art" src="${np.img}" alt="${np.title}"
            onerror="this.style.visibility='hidden'">
          <div class="np-eq">
            <div class="np-eq-bar"></div>
            <div class="np-eq-bar"></div>
            <div class="np-eq-bar"></div>
          </div>
        </div>
        <div class="np-info" style="flex:1; min-width:0;">
          <div class="np-label">Now Playing</div>
          <div class="np-title">${np.title}</div>
          <div class="np-artist">${np.artist}</div>
          <div class="np-scrubber">
            <div class="np-track">
              <div class="np-fill" id="np-fill-${theme.cls}"></div>
            </div>
            <div class="np-times">
              <span id="np-el-${theme.cls}">1:08</span>
              <span>${np.dur}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Up Next -->
      <div class="queue-header">
        <span class="queue-header-label">Up Next</span>
        <div class="queue-header-right">
          <span class="queue-count">${upNext.length} remaining</span>
          <button class="clear-btn" id="clear-${theme.cls}">Clear</button>
        </div>
      </div>

      <div class="queue-list" id="list-${theme.cls}">
        ${renderRows(upNext)}
      </div>

      <div class="queue-footer">
        <span class="queue-footer-text">Total</span>
        <span class="queue-footer-dur" id="dur-${theme.cls}">${totalDuration(upNext)}</span>
      </div>

      <div class="bottom-nav">
        <button class="nav-tab">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <path d="M4 19.5A2.5 2.5 0 016.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/>
          </svg>
          <span>Library</span>
        </button>
        <button class="nav-tab">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span>Player</span>
        </button>
        <button class="nav-tab active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="8" y1="6" x2="21" y2="6"/>
            <line x1="8" y1="12" x2="21" y2="12"/>
            <line x1="8" y1="18" x2="21" y2="18"/>
            <line x1="3" y1="6" x2="3.01" y2="6"/>
            <line x1="3" y1="12" x2="3.01" y2="12"/>
            <line x1="3" y1="18" x2="3.01" y2="18"/>
          </svg>
          <span>Queue</span>
        </button>
      </div>
    </div>
    <p class="theme-label">${theme.label}</p>
  </div>`;
            }

            document.body.innerHTML = themes.map(renderPhone).join("");

            // ── Per-phone logic ──
            themes.forEach((theme) => {
                const id = theme.cls;
                let items = [...queue.slice(1)];
                let elapsed = 68;
                const TOTAL = 263;
                let playing = true;

                const fill = document.getElementById(`np-fill-${id}`);
                const elSpan = document.getElementById(`np-el-${id}`);
                const listEl = document.getElementById(`list-${id}`);
                const durEl = document.getElementById(`dur-${id}`);

                function fmt(s) {
                    return (
                        Math.floor(s / 60) +
                        ":" +
                        String(s % 60).padStart(2, "0")
                    );
                }

                // Playback tick
                setInterval(() => {
                    if (!playing) return;
                    elapsed = (elapsed + 1) % TOTAL;
                    fill.style.width =
                        ((elapsed / TOTAL) * 100).toFixed(2) + "%";
                    elSpan.textContent = fmt(elapsed);
                }, 1000);

                function rerender() {
                    listEl.innerHTML = renderRows(items);
                    durEl.textContent = totalDuration(items);
                    bindListEvents();
                }

                function bindListEvents() {
                    // Remove button
                    listEl.querySelectorAll(".q-remove").forEach((btn) => {
                        btn.addEventListener("click", (e) => {
                            e.stopPropagation();
                            const idx = parseInt(btn.dataset.idx);
                            items.splice(idx, 1);
                            rerender();
                        });
                    });

                    // Drag reorder
                    let dragSrc = null;
                    listEl.querySelectorAll(".q-row").forEach((row) => {
                        row.addEventListener("dragstart", () => {
                            dragSrc = row;
                            setTimeout(() => row.classList.add("dragging"), 0);
                        });
                        row.addEventListener("dragend", () => {
                            row.classList.remove("dragging");
                            listEl
                                .querySelectorAll(".q-row")
                                .forEach((r) =>
                                    r.classList.remove("drag-over"),
                                );
                        });
                        row.addEventListener("dragover", (e) => {
                            e.preventDefault();
                            listEl
                                .querySelectorAll(".q-row")
                                .forEach((r) =>
                                    r.classList.remove("drag-over"),
                                );
                            if (row !== dragSrc) row.classList.add("drag-over");
                        });
                        row.addEventListener("drop", (e) => {
                            e.preventDefault();
                            if (!dragSrc || dragSrc === row) return;
                            const fromIdx = parseInt(dragSrc.dataset.idx);
                            const toIdx = parseInt(row.dataset.idx);
                            const moved = items.splice(fromIdx, 1)[0];
                            items.splice(toIdx, 0, moved);
                            rerender();
                        });
                    });
                }

                bindListEvents();
            });
        </script>
    </body>
</html>
