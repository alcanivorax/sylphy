<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Queue — All Themes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  min-height: 100vh; background: #111;
  display: flex; align-items: flex-start; justify-content: center;
  gap: 40px; padding: 48px 32px 64px;
  font-family: 'DM Sans', sans-serif;
  -webkit-font-smoothing: antialiased; flex-wrap: wrap;
}

.phone-wrap { display: flex; flex-direction: column; align-items: center; }
.phone {
  width: 360px; height: 820px; border-radius: 44px;
  overflow: hidden; display: flex; flex-direction: column;
  position: relative; flex-shrink: 0;
}
.theme-label {
  margin-top: 18px; font-family: 'Space Mono', monospace;
  font-size: 9px; letter-spacing: .22em; text-transform: uppercase;
  color: #3a3a3a; text-align: center;
}

/* ══ TOKENS ══ */
.nothing {
  --bg: #000; --surface: #0e0e0e; --surface2: #161616; --surface3: #1e1e1e;
  --border: #222; --border2: #2c2c2c;
  --muted: #444; --muted2: #666;
  --fg: #f0f0f0; --fg-dim: rgba(240,240,240,.45);
  --accent: #ff3b3b; --accent-dim: rgba(255,59,59,.1);
  --tab-ind: #ff3b3b;
  --np-bg: rgba(255,59,59,.07); --np-border: rgba(255,59,59,.22); --np-bar: #ff3b3b;
  --progress: #ff3b3b; --progress-bg: #2c2c2c;
  --drag: #333; --remove: #444; --remove-h: #ff3b3b;
  background: var(--bg);
  box-shadow: 0 0 0 1px #1c1c1c, 0 48px 100px rgba(0,0,0,.95), 0 0 80px rgba(255,59,59,.04);
}
.obsidian {
  --bg: #0a0a0a; --surface: #111; --surface2: #181818; --surface3: #202020;
  --border: #1e1e1e; --border2: #272727;
  --muted: #3a3a3a; --muted2: #5a5a5a;
  --fg: #e8e8e8; --fg-dim: rgba(232,232,232,.4);
  --accent: #e8e8e8; --accent-dim: rgba(232,232,232,.05);
  --tab-ind: #e8e8e8;
  --np-bg: rgba(232,232,232,.05); --np-border: rgba(232,232,232,.14); --np-bar: #e8e8e8;
  --progress: #e8e8e8; --progress-bg: #272727;
  --drag: #2e2e2e; --remove: #3a3a3a; --remove-h: #888;
  background: var(--bg);
  box-shadow: 0 0 0 1px #1a1a1a, 0 48px 100px rgba(0,0,0,.95);
}
.chalk {
  --bg: #f2f0eb; --surface: #eae7e0; --surface2: #e0ddd6; --surface3: #d6d2ca;
  --border: #ccc8bf; --border2: #b8b3a8;
  --muted: #a09a92; --muted2: #7a756e;
  --fg: #1a1814; --fg-dim: rgba(26,24,20,.4);
  --accent: #1a1814; --accent-dim: rgba(26,24,20,.05);
  --tab-ind: #1a1814;
  --np-bg: rgba(26,24,20,.05); --np-border: rgba(26,24,20,.18); --np-bar: #1a1814;
  --progress: #1a1814; --progress-bg: #ccc8bf;
  --drag: #c0bbb3; --remove: #b0aba3; --remove-h: #555;
  background: var(--bg);
  box-shadow: 0 0 0 1px var(--border), 0 48px 100px rgba(26,24,20,.22), inset 0 0 0 1px rgba(255,255,255,.55);
}

/* ══ STATUS ══ */
.status {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 26px 0; height: 46px; flex-shrink: 0; color: var(--fg);
}
.status-time { font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700; letter-spacing: .04em; }
.status-icons { display: flex; gap: 5px; align-items: center; }

/* ══ HEADER ══ */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 22px 0; flex-shrink: 0;
}
.header-left { display: flex; flex-direction: column; gap: 2px; }
.header-title { font-family: 'Space Mono', monospace; font-size: 22px; font-weight: 700; letter-spacing: .04em; color: var(--fg); line-height: 1; }
.header-meta { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--muted2); margin-top: 4px; }
.header-actions { display: flex; gap: 4px; align-items: center; }
.icon-btn {
  background: none; border: none; cursor: pointer; color: var(--muted2);
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  border-radius: 3px; transition: color .14s;
}
.icon-btn:hover { color: var(--fg); }
.icon-btn.accent { color: var(--accent); }

/* ══ NOW PLAYING CARD ══ */
.np-card {
  margin: 14px 22px 0;
  border: 1px solid var(--np-border); border-radius: 3px;
  background: var(--np-bg); padding: 12px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; position: relative; overflow: hidden;
}
.np-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 2px; background: var(--np-bar); border-radius: 3px 0 0 3px;
}
.np-art-wrap { position: relative; flex-shrink: 0; }
.np-art {
  width: 52px; height: 52px; border-radius: 3px;
  border: 1px solid var(--border2); overflow: hidden; display: block;
}
.np-eq {
  position: absolute; bottom: 4px; left: 4px;
  display: flex; align-items: flex-end; gap: 2px;
  background: rgba(0,0,0,.55); padding: 3px 4px 2px; border-radius: 2px;
}
.chalk .np-eq { background: rgba(242,240,235,.7); }
.np-eq-bar {
  width: 3px; border-radius: 1px; background: var(--accent);
  animation: eqp .7s ease-in-out infinite alternate;
}
.np-eq-bar:nth-child(1){ height:8px; animation-delay:0s; }
.np-eq-bar:nth-child(2){ height:12px; animation-delay:.18s; }
.np-eq-bar:nth-child(3){ height:6px; animation-delay:.36s; }
@keyframes eqp { from { transform: scaleY(.25); } to { transform: scaleY(1); } }

.np-info { flex: 1; min-width: 0; }
.np-label { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); margin-bottom: 4px; }
.np-title { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
.np-artist { font-family: 'Space Mono', monospace; font-size: 9.5px; letter-spacing: .06em; color: var(--muted2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.np-bar-wrap { margin-top: 10px; }
.np-track { width: 100%; height: 2px; background: var(--progress-bg); border-radius: 2px; position: relative; }
.np-fill { height: 100%; width: 26%; background: var(--progress); border-radius: 2px; }
.np-times { display: flex; justify-content: space-between; margin-top: 5px; }
.np-times span { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: .04em; }

/* ══ UP NEXT HEADER ══ */
.queue-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 22px 8px; flex-shrink: 0;
}
.queue-header-label { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; color: var(--muted); }
.queue-header-right { display: flex; align-items: center; gap: 12px; }
.queue-count { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .1em; color: var(--muted); }
.clear-btn {
  font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  background: none; border: none; cursor: pointer; color: var(--muted2);
  padding: 3px 0; transition: color .14s;
}
.clear-btn:hover { color: var(--fg); }

/* ══ QUEUE LIST ══ */
.queue-list { flex: 1; overflow-y: auto; overflow-x: hidden; scrollbar-width: none; padding-bottom: 4px; }
.queue-list::-webkit-scrollbar { display: none; }

.q-row {
  display: flex; align-items: center; padding: 8px 22px;
  gap: 10px; cursor: pointer; transition: background .12s; position: relative; user-select: none;
}
.q-row:hover { background: var(--accent-dim); }
.q-row + .q-row::before {
  content: ''; position: absolute; top: 0;
  left: 68px; right: 22px; height: 1px; background: var(--border);
}
.drag-handle { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; cursor: grab; padding: 4px 2px; opacity: 0; transition: opacity .15s; }
.q-row:hover .drag-handle { opacity: 1; }
.drag-handle span { display: block; width: 14px; height: 1.5px; border-radius: 1px; background: var(--drag); }
.q-pos { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; letter-spacing: .04em; color: var(--muted); width: 18px; text-align: right; flex-shrink: 0; }
.q-art { width: 44px; height: 44px; border-radius: 3px; flex-shrink: 0; border: 1px solid var(--border2); overflow: hidden; }
.q-text { flex: 1; min-width: 0; }
.q-title { font-family: 'DM Sans', sans-serif; font-size: 13.5px; font-weight: 500; color: var(--fg); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.q-artist { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .06em; color: var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.q-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.q-dur { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: .04em; }
.q-remove {
  background: none; border: none; cursor: pointer; color: var(--remove);
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
  border-radius: 3px; opacity: 0; transition: opacity .14s, color .14s;
}
.q-row:hover .q-remove { opacity: 1; }
.q-remove:hover { color: var(--remove-h); }

/* ══ FOOTER ══ */
.queue-footer {
  display: flex; align-items: center; justify-content: center;
  padding: 10px 22px; gap: 6px; flex-shrink: 0; border-top: 1px solid var(--border);
}
.queue-footer-text { font-family: 'Space Mono', monospace; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); }
.queue-footer-dur { font-family: 'Space Mono', monospace; font-size: 9px; font-weight: 700; letter-spacing: .1em; color: var(--muted2); }

/* ══ BOTTOM NAV ══ */
.bottom-nav { display: flex; height: 68px; flex-shrink: 0; border-top: 1px solid var(--border); }
.nav-tab {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; background: none; border: none; cursor: pointer; color: var(--muted2);
  padding-bottom: 8px; position: relative; transition: color .14s;
}
.nav-tab.active { color: var(--fg); }
.nav-tab.active::before {
  content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 2px; border-radius: 0 0 2px 2px; background: var(--tab-ind);
}
.nav-tab span { font-family: 'Space Mono', monospace; font-size: 8px; letter-spacing: .2em; text-transform: uppercase; }

/* ══ ANIM ══ */
.header { animation: up .42s .04s both; }
.np-card { animation: up .42s .09s both; }
.queue-header { animation: up .42s .13s both; }
.queue-list { animation: up .42s .17s both; }
@keyframes up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.q-row.dragging { opacity: .35; background: var(--accent-dim); }
</style>
</head>
<body>
<script>
/* ══ GENERATIVE ART — same engine as library ══ */
function hash(str) {
  let h = 5381;
  for (let i = 0; i < str.length; i++) h = ((h << 5) + h) ^ str.charCodeAt(i);
  return Math.abs(h);
}

function artSVG(seed, size, bg, stroke, mark) {
  const h = hash(seed);
  const type = h % 5;
  const s = size, cx = s / 2, cy = s / 2;
  let paths = '';

  if (type === 0) {
    const gap = 7 + (h % 5) * 2;
    for (let i = -s; i < s * 2; i += gap)
      paths += `<line x1="${i}" y1="0" x2="${i+s}" y2="${s}" stroke="${stroke}" stroke-width="1" opacity=".65"/>`;
    const off = h % (s/2);
    paths += `<line x1="${off}" y1="0" x2="${off+s}" y2="${s}" stroke="${mark}" stroke-width="2.5" opacity=".9"/>`;
  } else if (type === 1) {
    const count = 3 + (h % 4), step = (s * 0.42) / count;
    for (let i = 1; i <= count; i++) {
      const op = (0.25 + (i/count)*0.55).toFixed(2);
      paths += `<circle cx="${cx}" cy="${cy}" r="${step*i}" fill="none" stroke="${stroke}" stroke-width="${i===count?1.5:1}" opacity="${op}"/>`;
    }
    paths += `<circle cx="${cx}" cy="${cy}" r="3" fill="${mark}" opacity=".85"/>`;
  } else if (type === 2) {
    const cols = 5 + (h % 3), gapX = s / (cols + 1), rows = Math.round(s / gapX);
    for (let r = 1; r <= rows; r++)
      for (let c = 1; c <= cols; c++) {
        const rr = hash(seed + r*31 + c*17) % 3;
        const op = rr===0?.55:rr===1?.22:.09;
        paths += `<circle cx="${gapX*c}" cy="${gapX*r}" r="1.5" fill="${stroke}" opacity="${op}"/>`;
      }
    const ac = 1+(h%cols), ar = 1+((h>>4)%rows);
    paths += `<circle cx="${gapX*ac}" cy="${gapX*ar}" r="3.5" fill="${mark}" opacity=".88"/>`;
  } else if (type === 3) {
    const bars = 14 + (h % 8), bw = (s-12)/bars;
    for (let i = 0; i < bars; i++) {
      const bh = 5 + (hash(seed+i*7) % (s*0.55));
      const x = (6+i*bw+bw*0.1).toFixed(1), y = (cy-bh/2).toFixed(1);
      const op = 0.22 + (i%3===0?.5:.12);
      paths += `<rect x="${x}" y="${y}" width="${(bw*0.7).toFixed(1)}" height="${bh.toFixed(1)}" rx="1" fill="${stroke}" opacity="${op}"/>`;
    }
    const hi = h%bars, hh = 5+(hash(seed+hi*7)%(s*0.55));
    paths += `<rect x="${(6+hi*bw+bw*0.1).toFixed(1)}" y="${(cy-hh/2).toFixed(1)}" width="${(bw*0.7).toFixed(1)}" height="${hh.toFixed(1)}" rx="1" fill="${mark}" opacity=".9"/>`;
  } else {
    const count = 3+(h%4), step = s/(count+1);
    for (let i = 1; i <= count; i++) {
      const y = step*i, hw = s*0.35, ht = s*0.09, op = (0.12+(i/count)*0.5).toFixed(2);
      paths += `<polyline points="${cx-hw},${y+ht} ${cx},${y-ht} ${cx+hw},${y+ht}" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="${op}"/>`;
    }
    const by = step*(1+h%count), hw = s*0.35, ht = s*0.09;
    paths += `<polyline points="${cx-hw},${by+ht} ${cx},${by-ht} ${cx+hw},${by+ht}" fill="none" stroke="${mark}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>`;
  }
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" fill="${bg}"/>${paths}</svg>`)}`;
}

const themeArt = {
  nothing:  { bg: '#191919', stroke: '#333',    mark: 'rgba(255,59,59,0.7)'   },
  obsidian: { bg: '#181818', stroke: '#2e2e2e', mark: 'rgba(232,232,232,0.5)' },
  chalk:    { bg: '#dedad2', stroke: '#c0bbb3', mark: 'rgba(26,24,20,0.4)'   },
};

function art(seed, size, tid) {
  const t = themeArt[tid];
  return artSVG(seed, size, t.bg, t.stroke, t.mark);
}

/* ══ DATA ══ */
const queue = [
  { title: 'Tose Naina',  artist: 'Arijit Singh',          dur: '4:23' },
  { title: 'AIZO',        artist: 'King Gnu',               dur: '3:57' },
  { title: 'Bulleya',     artist: 'Papon',                  dur: '4:33' },
  { title: 'RISE',        artist: 'The Glitch Mob · Mako',  dur: '3:30' },
  { title: 'Titli',       artist: 'Shreya Ghoshal',         dur: '5:47' },
];

const themes = [
  { cls: 'nothing',  label: 'Nothing — Red Accent' },
  { cls: 'obsidian', label: 'Obsidian — Dark Mono'  },
  { cls: 'chalk',    label: 'Chalk — Light Mono'    },
];

function statusIcons() {
  return `
    <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
      <rect x="0" y="6" width="3" height="5" rx=".5"/>
      <rect x="4" y="4" width="3" height="7" rx=".5"/>
      <rect x="8" y="2" width="3" height="9" rx=".5"/>
      <rect x="12" y="0" width="3" height="11" rx=".5" opacity=".25"/>
    </svg>
    <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
      <path d="M7.5 8.5a1.3 1.3 0 110 2.6 1.3 1.3 0 010-2.6zm0-3.2c1.6 0 3 .7 4 1.8L10.2 8.4A3.6 3.6 0 007.5 7.3c-1 0-2 .4-2.7 1.1L3.5 7.1a5.4 5.4 0 014-1.8zm0-3.1c2.5 0 4.7 1 6.3 2.7l-1.3 1.3A6.2 6.2 0 007.5 4 6.2 6.2 0 002 6.2L.7 4.9A8.5 8.5 0 017.5 2.2z"/>
    </svg>
    <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
      <rect x=".5" y=".5" width="20" height="10" rx="2.5" stroke="currentColor" stroke-opacity=".4"/>
      <rect x="2" y="2" width="15" height="7" rx="1.5" fill="currentColor"/>
      <path d="M22 3.5v4a1.8 1.8 0 000-4z" fill="currentColor" opacity=".35"/>
    </svg>`;
}

function totalDur(items) {
  const s = items.reduce((a, t) => { const [m,sec]=t.dur.split(':').map(Number); return a+m*60+sec; }, 0);
  const h=Math.floor(s/3600), m=Math.floor((s%3600)/60), sec=s%60;
  return h>0 ? `${h}h ${m}m` : `${m}m ${sec}s`;
}

function renderRows(items, tid) {
  return items.map((s, i) => `
    <div class="q-row" draggable="true" data-idx="${i}">
      <div class="drag-handle"><span></span><span></span><span></span></div>
      <span class="q-pos">${String(i+1).padStart(2,'0')}</span>
      <div class="q-art">
        <img src="${art(s.title, 44, tid)}" width="44" height="44" style="display:block;">
      </div>
      <div class="q-text">
        <div class="q-title">${s.title}</div>
        <div class="q-artist">${s.artist}</div>
      </div>
      <div class="q-right">
        <span class="q-dur">${s.dur}</span>
        <button class="q-remove" data-idx="${i}" title="Remove">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
    </div>`).join('');
}

function renderPhone(theme) {
  const tid = theme.cls;
  const np = queue[0], upNext = queue.slice(1);

  const navTabs = [
    { l:'Library', active:false, icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>` },
    { l:'Player',  active:false, icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>` },
    { l:'Queue',   active:true,  icon:`<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>` },
  ].map(t => `<button class="nav-tab ${t.active?'active':''}">${t.icon}<span>${t.l}</span></button>`).join('');

  return `
  <div class="phone-wrap">
    <div class="phone ${tid}" id="phone-${tid}">
      <div class="status">
        <span class="status-time">9:41</span>
        <div class="status-icons">${statusIcons()}</div>
      </div>
      <div class="header">
        <div class="header-left">
          <span class="header-title">QUEUE</span>
          <span class="header-meta">${queue.length} tracks · ${totalDur(queue)}</span>
        </div>
        <div class="header-actions">
          <button class="icon-btn accent" title="Shuffle">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
          </button>
          <button class="icon-btn" title="Add">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Now Playing Card -->
      <div class="np-card">
        <div class="np-art-wrap">
          <div class="np-art">
            <img src="${art(np.title, 52, tid)}" width="52" height="52" style="display:block;">
          </div>
          <div class="np-eq">
            <div class="np-eq-bar"></div>
            <div class="np-eq-bar"></div>
            <div class="np-eq-bar"></div>
          </div>
        </div>
        <div class="np-info">
          <div class="np-label">Now Playing</div>
          <div class="np-title">${np.title}</div>
          <div class="np-artist">${np.artist}</div>
          <div class="np-bar-wrap">
            <div class="np-track"><div class="np-fill" id="npfill-${tid}"></div></div>
            <div class="np-times">
              <span id="npel-${tid}">1:08</span>
              <span>${np.dur}</span>
            </div>
          </div>
        </div>
      </div>

      <div class="queue-header">
        <span class="queue-header-label">Up Next</span>
        <div class="queue-header-right">
          <span class="queue-count" id="remaining-${tid}">${upNext.length} remaining</span>
          <button class="clear-btn" id="clear-${tid}">Clear</button>
        </div>
      </div>

      <div class="queue-list" id="list-${tid}"></div>

      <div class="queue-footer">
        <span class="queue-footer-text">Total</span>
        <span class="queue-footer-dur" id="tdur-${tid}">${totalDur(upNext)}</span>
      </div>

      <div class="bottom-nav">${navTabs}</div>
    </div>
    <p class="theme-label">${theme.label}</p>
  </div>`;
}

document.body.innerHTML = themes.map(renderPhone).join('');

/* ══ PER-PHONE LOGIC ══ */
themes.forEach(theme => {
  const tid = theme.cls;
  let items = [...queue.slice(1)];
  let elapsed = 68;
  const TOTAL = 263;
  let playing = true;

  const fill    = document.getElementById(`npfill-${tid}`);
  const elSpan  = document.getElementById(`npel-${tid}`);
  const listEl  = document.getElementById(`list-${tid}`);
  const durEl   = document.getElementById(`tdur-${tid}`);
  const remEl   = document.getElementById(`remaining-${tid}`);

  function fmt(s){ return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

  setInterval(() => {
    if (!playing) return;
    elapsed = (elapsed+1)%TOTAL;
    fill.style.width = (elapsed/TOTAL*100).toFixed(2)+'%';
    elSpan.textContent = fmt(elapsed);
  }, 1000);

  function rerender() {
    listEl.innerHTML = renderRows(items, tid);
    durEl.textContent = totalDur(items);
    remEl.textContent = items.length+' remaining';
    bindEvents();
  }

  function bindEvents() {
    listEl.querySelectorAll('.q-remove').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        items.splice(parseInt(btn.dataset.idx), 1);
        rerender();
      });
    });

    let dragSrc = null;
    listEl.querySelectorAll('.q-row').forEach(row => {
      row.addEventListener('dragstart', () => {
        dragSrc = row;
        setTimeout(() => row.classList.add('dragging'), 0);
      });
      row.addEventListener('dragend', () => {
        row.classList.remove('dragging');
        listEl.querySelectorAll('.q-row').forEach(r => r.style.borderTop='');
      });
      row.addEventListener('dragover', e => {
        e.preventDefault();
        listEl.querySelectorAll('.q-row').forEach(r => r.style.borderTop='');
        if (row !== dragSrc) row.style.borderTop = `2px solid var(--accent)`;
      });
      row.addEventListener('drop', e => {
        e.preventDefault();
        if (!dragSrc || dragSrc===row) return;
        const from = parseInt(dragSrc.dataset.idx);
        const to   = parseInt(row.dataset.idx);
        const moved = items.splice(from,1)[0];
        items.splice(to,0,moved);
        rerender();
      });
    });
  }

  document.getElementById(`clear-${tid}`).addEventListener('click', () => {
    items = [];
    rerender();
  });

  rerender();
});
</script>
</body>
</html>
