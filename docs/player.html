<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player — All Themes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  min-height:100vh;
  background:#111;
  display:flex;align-items:flex-start;justify-content:center;
  gap:40px;padding:52px 28px 80px;
  font-family:'DM Sans',sans-serif;
  -webkit-font-smoothing:antialiased;
  flex-wrap:wrap;
}
.wrap{display:flex;flex-direction:column;align-items:center;}
.label{
  margin-top:16px;
  font-family:'Space Mono',monospace;
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  color:#333;text-align:center;
}

/* ── PHONE ── */
.phone{
  width:360px;height:780px;
  border-radius:46px;
  overflow:hidden;
  display:flex;flex-direction:column;
  position:relative;flex-shrink:0;
}

/* ── TOKENS ── */
.N{
  --bg:#000;--s1:#0d0d0d;--s2:#1a1a1a;
  --b1:#222;--b2:#2e2e2e;
  --mu:#484848;--mu2:#686868;
  --fg:#f0f0f0;--fd:rgba(240,240,240,.45);
  --ac:#ff3b3b;
  --pb:#f0f0f0;--pf:#000;
  --pr:#ff3b3b;--vf:rgba(240,240,240,.4);
  --ti:#ff3b3b;
  --disc:#0d0d0d;--disc-b:#222;
  --groove:rgba(255,255,255,.015);
  --label-bg:#111;--label-b:#222;
  --spindle:#ff3b3b;
  background:#000;
  box-shadow:0 0 0 1px #1c1c1c,0 60px 120px #000;
}
.O{
  --bg:#080808;--s1:#0e0e0e;--s2:#181818;
  --b1:#1e1e1e;--b2:#282828;
  --mu:#3e3e3e;--mu2:#5e5e5e;
  --fg:#e0e0e0;--fd:rgba(224,224,224,.4);
  --ac:#e0e0e0;
  --pb:#e0e0e0;--pf:#080808;
  --pr:#e0e0e0;--vf:rgba(224,224,224,.35);
  --ti:#e0e0e0;
  --disc:#0c0c0c;--disc-b:#1e1e1e;
  --groove:rgba(255,255,255,.012);
  --label-bg:#0e0e0e;--label-b:#1e1e1e;
  --spindle:#e0e0e0;
  background:#080808;
  box-shadow:0 0 0 1px #161616,0 60px 120px #000;
}
.C{
  --bg:#f0ede8;--s1:#e8e5e0;--s2:#dedad4;
  --b1:#cdc9c2;--b2:#b8b3ac;
  --mu:#9e9890;--mu2:#706c65;
  --fg:#1a1816;--fd:rgba(26,24,22,.4);
  --ac:#1a1816;
  --pb:#1a1816;--pf:#f0ede8;
  --pr:#1a1816;--vf:rgba(26,24,22,.35);
  --ti:#1a1816;
  --disc:#e2dfd9;--disc-b:#cdc9c2;
  --groove:rgba(26,24,22,.03);
  --label-bg:#ece9e3;--label-b:#cdc9c2;
  --spindle:#1a1816;
  background:#f0ede8;
  box-shadow:0 0 0 1px #cdc9c2,0 60px 120px rgba(26,24,22,.2),inset 0 0 0 1px rgba(255,255,255,.6);
}

/* ── STATUS ── */
.status{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 24px 0;height:46px;
  color:var(--fg);flex-shrink:0;
}
.stime{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.04em;}
.sicons{display:flex;gap:5px;align-items:center;}

/* ── TOP NAV ── */
.tnav{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 20px 0;height:40px;flex-shrink:0;
}
.tnbtn{
  background:none;border:none;cursor:pointer;color:var(--mu2);
  width:36px;height:36px;
  display:flex;align-items:center;justify-content:center;
  border-radius:3px;transition:color .15s;
}
.tnbtn:hover{color:var(--fg);}
.tnlbl{font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--fd);}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;padding:0 24px;overflow:hidden;}

/* ══════════════════════════════
   DISC — pure flat geometry
══════════════════════════════ */
.disc-wrap{
  margin-top:18px;
  display:flex;justify-content:center;
  flex-shrink:0;
}

/* Shared outer ring */
.disc{
  width:258px;height:258px;
  border-radius:50%;
  border:1px solid var(--disc-b);
  background:var(--disc);
  position:relative;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  animation:spin 14s linear infinite paused;
}
.disc.go{animation-play-state:running;}
@keyframes spin{to{transform:rotate(360deg);}}

/* Groove rings — pure CSS repeating-radial, no gradient fill */
.disc::before{
  content:'';
  position:absolute;inset:0;border-radius:50%;
  background:repeating-radial-gradient(
    circle at center,
    transparent 0,transparent 4px,
    var(--groove) 4px,var(--groove) 4.5px
  );
}

/* Art circle — counter-spins */
.disc-art{
  width:110px;height:110px;
  border-radius:50%;
  overflow:hidden;
  position:relative;z-index:2;
  border:1px solid var(--disc-b);
  animation:ctr 14s linear infinite paused;
  flex-shrink:0;
}
.disc.go .disc-art{animation-play-state:running;}
@keyframes ctr{to{transform:rotate(-360deg);}}

/* Spindle */
.disc-spindle{
  position:absolute;z-index:3;
  width:10px;height:10px;
  border-radius:50%;
  background:var(--spindle);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
}

/* ── NOTHING: extra label ring between grooves and art ── */
.N .disc-ring{
  position:absolute;z-index:1;
  width:140px;height:140px;
  border-radius:50%;
  border:1px solid #222;
  background:#000;
}
/* second inner ring */
.N .disc-ring::before{
  content:'';
  position:absolute;inset:8px;
  border-radius:50%;
  border:1px solid #1c1c1c;
}
/* Red spindle override */
.N .disc-spindle{background:#ff3b3b;}

/* ── OBSIDIAN: concentric step rings, no fill variation ── */
.O .disc-ring-a{
  position:absolute;z-index:1;
  width:192px;height:192px;
  border-radius:50%;
  border:1px solid #1c1c1c;
}
.O .disc-ring-b{
  position:absolute;z-index:1;
  width:148px;height:148px;
  border-radius:50%;
  border:1px solid #1c1c1c;
}
/* Spindle — small bright dot on dark */
.O .disc-spindle{
  width:8px;height:8px;
  background:#e0e0e0;
}

/* ── CHALK: label rectangle inside disc ── */
/* The disc itself is slightly lighter on chalk — just the border changes */
.C .disc{background:var(--disc);border-color:var(--disc-b);}
/* Label square — geometric, not a circle */
.C .disc-label{
  position:absolute;z-index:1;
  width:130px;height:130px;
  border:1px solid var(--disc-b);
  background:var(--label-bg);
  display:flex;align-items:center;justify-content:center;
}
/* Two label lines */
.C .disc-label::before{
  content:'';
  position:absolute;
  inset:10px;
  border:1px solid var(--label-b);
}
.C .disc-label::after{
  content:'';
  position:absolute;
  inset:20px;
  border:1px solid var(--label-b);
}
/* Art sits inside the square label */
.C .disc-art{
  width:80px;height:80px;
  border-radius:0;
  border:1px solid var(--disc-b);
}
/* Square spindle — ink dot */
.C .disc-spindle{
  width:8px;height:8px;
  border-radius:0;
  background:var(--spindle);
}

/* ── TRACK INFO ── */
.tinfo{
  margin-top:24px;
  display:flex;align-items:flex-start;
  justify-content:space-between;gap:12px;
}
.ttext{flex:1;min-width:0;}
.ttitle{
  font-family:'DM Sans',sans-serif;
  font-size:21px;font-weight:500;
  color:var(--fg);
  letter-spacing:-.4px;line-height:1.2;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tartist{
  margin-top:3px;
  font-family:'Space Mono',monospace;
  font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--mu2);
}
.favbtn{
  background:none;border:none;cursor:pointer;
  color:var(--mu);padding:4px;margin-top:1px;
  flex-shrink:0;transition:color .2s,transform .2s;
}
.favbtn:hover{color:var(--ac);transform:scale(1.12);}
.favbtn.on{color:var(--ac);}
.favbtn.on path{fill:currentColor;stroke:currentColor;}

/* Badges */
.bdgs{margin-top:8px;display:flex;gap:5px;}
.bdg{
  font-family:'Space Mono',monospace;
  font-size:8.5px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  padding:2px 6px;border-radius:3px;
  border:1px solid var(--b2);color:var(--mu2);
}
.bdg.hi{border-color:var(--ac);color:var(--ac);}

/* ── SCRUBBER ── */
.scrubber{margin-top:20px;}
.strack{
  width:100%;height:3px;
  background:var(--b2);border-radius:2px;
  position:relative;cursor:pointer;
}
.sfill{
  height:100%;width:26%;
  background:var(--pr);border-radius:2px;
  position:relative;transition:width .1s linear;
}
.sthumb{
  width:13px;height:13px;border-radius:50%;
  background:var(--fg);
  position:absolute;right:-6.5px;top:50%;
  transform:translateY(-50%);transition:transform .15s;
}
.strack:hover .sthumb{transform:translateY(-50%) scale(1.3);}
.stimes{display:flex;justify-content:space-between;margin-top:7px;}
.stimes span{font-family:'Space Mono',monospace;font-size:10.5px;color:var(--mu);letter-spacing:.04em;}

/* ── CONTROLS ── */
.ctrls{
  margin-top:20px;
  display:flex;align-items:center;justify-content:space-between;
}
.ctrl{
  background:none;border:none;cursor:pointer;
  color:var(--fd);
  width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  border-radius:3px;
  transition:color .14s,transform .14s;
  position:relative;
}
.ctrl:hover{color:var(--fg);transform:scale(1.08);}
.ctrl.on{color:var(--ac);}
.ctrl.on::after{
  content:'';position:absolute;
  bottom:1px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;
  background:var(--ac);
}
.playbtn{
  width:64px;height:64px;border-radius:3px;
  background:var(--pb);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--pf);
  transition:transform .12s;flex-shrink:0;
}
.playbtn:hover{transform:scale(1.04);}
.playbtn:active{transform:scale(.97);}

/* Secondary */
.sec{margin-top:14px;display:flex;align-items:center;gap:14px;}
.spdbtn{
  font-family:'Space Mono',monospace;
  font-size:10px;font-weight:700;letter-spacing:.1em;
  background:var(--s2);border:1px solid var(--b2);
  color:var(--mu2);padding:4px 9px;border-radius:3px;
  cursor:pointer;white-space:nowrap;transition:color .14s;
}
.spdbtn:hover{color:var(--fg);}
.volrow{flex:1;display:flex;align-items:center;gap:7px;color:var(--mu);}
.voltrack{flex:1;height:3px;background:var(--b2);border-radius:2px;cursor:pointer;}
.volfill{height:100%;width:68%;background:var(--vf);border-radius:2px;}

/* ── BOTTOM NAV ── */
.botnav{
  display:flex;height:68px;flex-shrink:0;
  border-top:1px solid var(--b1);
}
.ntab{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:4px;background:none;border:none;cursor:pointer;
  color:var(--mu2);padding-bottom:8px;
  position:relative;transition:color .14s;
}
.ntab.on{color:var(--fg);}
.ntab.on::before{
  content:'';position:absolute;
  top:0;left:50%;transform:translateX(-50%);
  width:28px;height:2px;
  border-radius:0 0 2px 2px;
  background:var(--ti);
}
.ntab span{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.2em;text-transform:uppercase;}

/* Animations */
.disc-wrap{animation:up .48s .04s both;}
.tinfo    {animation:up .48s .10s both;}
.bdgs     {animation:up .48s .15s both;}
.scrubber {animation:up .48s .19s both;}
.ctrls    {animation:up .48s .24s both;}
.sec      {animation:up .48s .29s both;}
@keyframes up{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<script>
/* ── GENERATIVE ART ── */
function hash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return Math.abs(h);}

function artSVG(seed,sz,bg,stroke,mark){
  const h=hash(seed),t=h%5,s=sz,cx=s/2,cy=s/2;
  let p='';
  if(t===0){
    const g=8+(h%4)*3;
    for(let i=-s;i<s*2;i+=g)p+=`<line x1="${i}" y1="0" x2="${i+s}" y2="${s}" stroke="${stroke}" stroke-width="1" opacity=".5"/>`;
    p+=`<line x1="${h%(s/2)}" y1="0" x2="${h%(s/2)+s}" y2="${s}" stroke="${mark}" stroke-width="2" opacity="1"/>`;
  } else if(t===1){
    const c=4+(h%3),step=(s*.44)/c;
    for(let i=1;i<=c;i++){
      const op=(.18+(i/c)*.55).toFixed(2);
      p+=`<circle cx="${cx}" cy="${cy}" r="${step*i}" fill="none" stroke="${stroke}" stroke-width="1" opacity="${op}"/>`;
    }
    p+=`<circle cx="${cx}" cy="${cy}" r="3" fill="${mark}"/>`;
  } else if(t===2){
    const cols=6+(h%3),gX=s/(cols+1),rows=Math.round(s/gX);
    for(let r=1;r<=rows;r++)
      for(let c=1;c<=cols;c++){
        const rr=hash(seed+r*31+c*17)%3;
        p+=`<circle cx="${gX*c}" cy="${gX*r}" r="1.2" fill="${stroke}" opacity="${rr===0?.6:rr===1?.25:.1}"/>`;
      }
    p+=`<circle cx="${gX*(1+h%cols)}" cy="${gX*(1+(h>>4)%rows)}" r="3" fill="${mark}"/>`;
  } else if(t===3){
    const bars=16+(h%8),bw=(s-8)/bars;
    for(let i=0;i<bars;i++){
      const bh=4+(hash(seed+i*7)%(s*.52));
      p+=`<rect x="${(4+i*bw+bw*.1).toFixed(1)}" y="${(cy-bh/2).toFixed(1)}" width="${(bw*.75).toFixed(1)}" height="${bh.toFixed(1)}" fill="${stroke}" opacity="${.18+(i%3===0?.52:.1)}"/>`;
    }
    const hi=h%bars,hh=4+(hash(seed+hi*7)%(s*.52));
    p+=`<rect x="${(4+hi*bw+bw*.1).toFixed(1)}" y="${(cy-hh/2).toFixed(1)}" width="${(bw*.75).toFixed(1)}" height="${hh.toFixed(1)}" fill="${mark}"/>`;
  } else {
    const c=4+(h%3),step=s/(c+1);
    for(let i=1;i<=c;i++){
      const y=step*i,hw=s*.36,ht=s*.08;
      const op=(.1+(i/c)*.48).toFixed(2);
      p+=`<polyline points="${cx-hw},${y+ht} ${cx},${y-ht} ${cx+hw},${y+ht}" fill="none" stroke="${stroke}" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" opacity="${op}"/>`;
    }
    const by=step*(1+h%c),hw=s*.36,ht=s*.08;
    p+=`<polyline points="${cx-hw},${by+ht} ${cx},${by-ht} ${cx+hw},${by+ht}" fill="none" stroke="${mark}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>`;
  }
  return `data:image/svg+xml;charset=utf-8,${encodeURIComponent(
    `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 ${s} ${s}"><rect width="${s}" height="${s}" fill="${bg}"/>${p}</svg>`
  )}`;
}

const TA={
  N:{bg:'#111',    stroke:'#2a2a2a', mark:'rgba(255,59,59,.9)'},
  O:{bg:'#0e0e0e', stroke:'#222',   mark:'rgba(224,224,224,.7)'},
  C:{bg:'#e2dfd9', stroke:'#bfbbb4',mark:'rgba(26,24,22,.55)'},
};
function mkArt(seed,sz,tid){const t=TA[tid];return artSVG(seed,sz,t.bg,t.stroke,t.mark);}

/* STATUS ICONS */
function sico(){return `
  <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
    <rect x="0" y="6" width="3" height="5" rx=".5"/><rect x="4" y="4" width="3" height="7" rx=".5"/>
    <rect x="8" y="2" width="3" height="9" rx=".5"/><rect x="12" y="0" width="3" height="11" rx=".5" opacity=".25"/>
  </svg>
  <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor">
    <path d="M7.5 8.5a1.3 1.3 0 110 2.6 1.3 1.3 0 010-2.6zm0-3.2c1.6 0 3 .7 4 1.8L10.2 8.4A3.6 3.6 0 007.5 7.3c-1 0-2 .4-2.7 1.1L3.5 7.1a5.4 5.4 0 014-1.8zm0-3.1c2.5 0 4.7 1 6.3 2.7l-1.3 1.3A6.2 6.2 0 007.5 4 6.2 6.2 0 002 6.2L.7 4.9A8.5 8.5 0 017.5 2.2z"/>
  </svg>
  <svg width="24" height="11" viewBox="0 0 24 11" fill="none">
    <rect x=".5" y=".5" width="20" height="10" rx="2.5" stroke="currentColor" stroke-opacity=".4"/>
    <rect x="2" y="2" width="15" height="7" rx="1.5" fill="currentColor"/>
    <path d="M22 3.5v4a1.8 1.8 0 000-4z" fill="currentColor" opacity=".35"/>
  </svg>`;}

/* DISC HTML */
function discHTML(tid,artSrc){
  if(tid==='N') return `
    <div class="disc go" id="disc-N">
      <div class="disc-ring">
        <div class="disc-art" id="art-N">
          <img src="${artSrc}" width="110" height="110" style="display:block;border-radius:50%;object-fit:cover;">
        </div>
      </div>
      <div class="disc-spindle"></div>
    </div>`;
  if(tid==='O') return `
    <div class="disc go" id="disc-O">
      <div class="disc-ring-a"></div>
      <div class="disc-ring-b"></div>
      <div class="disc-art" id="art-O">
        <img src="${artSrc}" width="110" height="110" style="display:block;border-radius:50%;object-fit:cover;">
      </div>
      <div class="disc-spindle"></div>
    </div>`;
  /* chalk — square label */
  return `
    <div class="disc go" id="disc-C">
      <div class="disc-label">
        <div class="disc-art" id="art-C">
          <img src="${artSrc}" width="80" height="80" style="display:block;object-fit:cover;">
        </div>
      </div>
      <div class="disc-spindle"></div>
    </div>`;
}

/* NAV */
const NAVI=[
  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>`,
  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>`,
  `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
];
const NAVL=['Library','Player','Queue'];

const TRACK={title:'Tose Naina',artist:'Arijit Singh · Mickey Virus'};
const TOTAL=263;
const THEMES=[{id:'N',label:'Nothing — Red Accent'},{id:'O',label:'Obsidian — Dark Mono'},{id:'C',label:'Chalk — Light Mono'}];

function renderPhone(th){
  const tid=th.id;
  const artSz=(tid==='C')?80:110;
  const a=mkArt(TRACK.title,artSz,tid);
  const nav=NAVL.map((l,i)=>`<button class="ntab${i===1?' on':''}">${NAVI[i]}<span>${l}</span></button>`).join('');
  return `
  <div class="wrap">
    <div class="phone ${tid}" id="ph-${tid}">
      <div class="status">
        <span class="stime">9:41</span>
        <div class="sicons">${sico()}</div>
      </div>
      <div class="tnav">
        <button class="tnbtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <span class="tnlbl">Now Playing</span>
        <button class="tnbtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>
        </button>
      </div>
      <div class="main">
        <div class="disc-wrap">${discHTML(tid,a)}</div>
        <div class="tinfo">
          <div class="ttext">

document.body.innerHTML = THEMES.map(renderPhone).join('');

/* Interactivity */
const SPEEDS=['0.5×','0.75×','1.0×','1.25×','1.5×','2.0×'];
THEMES.forEach(th=>{
  const tid=th.id;
  let playing=true,elapsed=68,si=2;
  const disc=document.getElementById('disc-'+tid);
  const sf=document.getElementById('sf-'+tid);
  const el=document.getElementById('el-'+tid);
  const st=document.getElementById('st-'+tid);
  const vt=document.getElementById('vt-'+tid);
  const vf=document.getElementById('vf-'+tid);
  function fmt(s){return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
  setInterval(()=>{
    if(!playing)return;
    elapsed=(elapsed+1)%TOTAL;
    sf.style.width=(elapsed/TOTAL*100).toFixed(2)+'%';
    el.textContent=fmt(elapsed);
  },1000);
  document.getElementById('pl-'+tid).addEventListener('click',()=>{
    playing=!playing;
    document.getElementById('pi-'+tid).style.display=playing?'block':'none';
    document.getElementById('pp-'+tid).style.display=playing?'none':'block';
    disc.classList.toggle('go',playing);
  });
  document.getElementById('sh-'+tid).addEventListener('click',function(){this.classList.toggle('on');});
  document.getElementById('rp-'+tid).addEventListener('click',function(){this.classList.toggle('on');});
  document.getElementById('fav-'+tid).addEventListener('click',function(){
    this.classList.toggle('on');
    const p=this.querySelector('path');
    p.setAttribute('fill',this.classList.contains('on')?'currentColor':'none');
    p.setAttribute('stroke','currentColor');
  });
  document.getElementById('spd-'+tid).addEventListener('click',function(){
    si=(si+1)%SPEEDS.length;this.textContent=SPEEDS[si];
  });
  st.addEventListener('click',e=>{
    const r=Math.max(0,Math.min(1,e.offsetX/st.offsetWidth));
    elapsed=Math.round(r*TOTAL);
    sf.style.width=(r*100)+'%';
    el.textContent=fmt(elapsed);
  });
  vt.addEventListener('click',e=>{
    vf.style.width=(Math.max(0,Math.min(1,e.offsetX/vt.offsetWidth))*100)+'%';
  });
});
</script>
</body>
</html>
